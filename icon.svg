<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#080f1f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle ring halo -->
  <circle cx="256" cy="235" r="168" fill="rgba(56,189,248,0.04)" stroke="rgba(56,189,248,0.12)" stroke-width="1.5"/>

  <!-- ── Bicycle ── -->
  <!-- Rear wheel -->
  <circle cx="164" cy="280" r="78" fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Front wheel -->
  <circle cx="348" cy="280" r="78" fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Wheel hubs -->
  <circle cx="164" cy="280" r="9" fill="#38bdf8"/>
  <circle cx="348" cy="280" r="9" fill="#38bdf8"/>

  <!-- Chain stay (rear hub → bottom bracket) -->
  <line x1="164" y1="280" x2="256" y2="280" stroke="#38bdf8" stroke-width="16" stroke-linecap="round"/>
  <!-- Seat tube (bottom bracket → seat cluster) -->
  <line x1="256" y1="280" x2="236" y2="192" stroke="#38bdf8" stroke-width="16" stroke-linecap="round"/>
  <!-- Down tube (head tube → bottom bracket) -->
  <line x1="312" y1="198" x2="256" y2="280" stroke="#38bdf8" stroke-width="16" stroke-linecap="round"/>
  <!-- Top tube (seat cluster → head tube) -->
  <line x1="236" y1="192" x2="312" y2="198" stroke="#38bdf8" stroke-width="13" stroke-linecap="round"/>
  <!-- Seat stay (seat cluster → rear hub) -->
  <line x1="236" y1="192" x2="164" y2="280" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
  <!-- Fork (head tube → front hub) -->
  <line x1="312" y1="198" x2="348" y2="280" stroke="#38bdf8" stroke-width="15" stroke-linecap="round"/>

  <!-- Bottom bracket -->
  <circle cx="256" cy="280" r="13" fill="#0f172a" stroke="#38bdf8" stroke-width="11"/>

  <!-- Seat post -->
  <line x1="246" y1="192" x2="237" y2="160" stroke="#38bdf8" stroke-width="13" stroke-linecap="round"/>
  <!-- Saddle -->
  <line x1="218" y1="157" x2="256" y2="157" stroke="#22c55e" stroke-width="15" stroke-linecap="round"/>

  <!-- Stem -->
  <line x1="312" y1="198" x2="325" y2="168" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
  <!-- Handlebar -->
  <line x1="314" y1="166" x2="340" y2="166" stroke="#22c55e" stroke-width="15" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="256" y="406"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="44" font-weight="800" text-anchor="middle" letter-spacing="-1.5">
    <tspan fill="#38bdf8">Safe</tspan><tspan fill="#22c55e">Ride</tspan>
  </text>
</svg>
